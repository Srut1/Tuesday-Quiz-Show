<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Tuesday Quiz Show</title>
  <link rel="stylesheet" href="../Style/style.css">
  <link rel="icon" type="image/png" href="../Images/braun.png">
  <script src="../Javascript/text.js"> </script>

</head>

<body>
<div class="container">
    <div id="game" class="justify-center flex-column">
        <div id="hud">
            <div id="timerBar">
                <div id="timer-bar"></div>
            </div>
            <div id="hud-item">
                <p class="hud-prefix" style="color: lightgoldenrodyellow;">Score</p>
                <h1 class="hud-main-text" id="score" style="color: lightgoldenrodyellow;">0</h1>
            </div>
        </div>

        <h2 id="question">What is the answer to this question?</h2>
        <div class="choice-container">
            <p class="choice-text" data-number="1">Choice 1</p>
        </div>
        <div class="choice-container">
            <p class="choice-text" data-number="2">Choice 2</p>
        </div>
        <div class="choice-container">
            <p class="choice-text" data-number="3">Choice 3</p>
        </div>
        <div class="choice-container">
            <p class="choice-text" data-number="4">Choice 4</p>
        </div>
    </div>  
</div> 
</body>

</html>
